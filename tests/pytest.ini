[pytest]
testpaths = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -v --tb=short
markers =
    integration: 集成测试（需要后端服务 + 数据库）
filterwarnings =
    ignore:.*OpenSSL.*:Warning
    ignore::urllib3.exceptions.NotOpenSSLWarning
env =
    DB_HOST=127.0.0.1
    DB_PORT=3306
    DB_USER=root
    DB_PASS=123456
    DB_NAME=xptsqas
    BACKEND_PORT=8088
    FRONTEND_PORT=5175
